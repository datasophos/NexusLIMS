name: Changelog

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

jobs:
  changelog:
    name: Changelog Fragment Check
    uses: ./.github/workflows/changelog-gate.yml
    with:
      base_ref: ${{ github.base_ref || 'main' }}
      should_check: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-changelog-required') }}
